name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libbz2-dev

      - name: Install Buildozer
        run: pip install buildozer

      - name: Build with Buildozer
        run: buildozer android debug
        # 这一步如果卡住，通常是因为在下载 SDK。GitHub 允许任务运行 6 小时，所以别担心。

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberLife-APK
          path: bin/*.apk
