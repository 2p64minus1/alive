name: Build APK
on:
  workflow_dispatch: # 增加手动点击触发按钮
  push:
    branches: [ main ] # 只要 main 分支有变动（包括你保存此文件）立即触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 使用更稳定的 Buildozer Action 镜像
      - name: Buildozer Action
        uses: Enteee/buildozer-action@v1.2.2
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberLife-APK
          path: bin/*.apk
